name = "gsf-trust"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"

[[d1_databases]]
binding = "DB"
database_name = "gsf-accounts-db"
database_id = "f8bf6798-a34b-4e2f-b1fe-4a1b1ee0cea7"

[vars]
NODE_ENV = "production"

# File exports (PDF/Excel) and backups are stored in Google Drive.
# R2 is not used in this project.

# Cron trigger: weekly backup every Sunday at 00:00 IST (18:30 UTC Saturday)
[triggers]
crons = ["30 18 * * 6"]
